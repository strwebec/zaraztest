# Render Blueprint — deploys the backend (Express) and frontend (Next.js) as two
# separate web services from this one repo. In the Render dashboard: New -> Blueprint,
# point it at this repo, and it reads this file.
#
# MongoDB is NOT included here — Render doesn't offer managed MongoDB. Use a free
# MongoDB Atlas cluster (atlas.mongodb.com, M0 tier) and paste its connection string
# into zaraz-backend's MONGODB_URI below after the blueprint deploys.
#
# After first deploy, both services get a *.onrender.com URL. Go back into each
# service's Environment tab and fill in the two `sync: false` cross-links:
#   - zaraz-backend  -> ALLOWED_ORIGIN = the frontend's URL (https://zaraz-frontend.onrender.com)
#   - zaraz-frontend -> BACKEND_URL    = the backend's URL  (https://zaraz-backend.onrender.com)
# Then trigger a manual redeploy on both so the new values take effect.

services:
  - type: web
    name: zaraz-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # MongoDB Atlas connection string — set manually after creating the cluster.
      - key: MONGODB_URI
        sync: false
      # Render can generate strong random secrets for these on first deploy.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      # The frontend's Render URL — fill in after the frontend service exists.
      - key: ALLOWED_ORIGIN
        sync: false
      - key: COMMISSION_PLATFORM
        value: "0.02"
      - key: COMMISSION_MANUAL
        value: "0.01"
      - key: SUPER_ADMIN_EMAIL
        sync: false
      # Required for uploaded photos/receipts to survive redeploys — see backend/.env.example.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Optional — leave blank to have emails logged to the Render console instead of sent.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      # Optional — Google Sheets offline-fallback sync, no-ops if left blank.
      - key: GOOGLE_SHEETS_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_SHEETS_PRIVATE_KEY
        sync: false

  - type: web
    name: zaraz-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # The backend's Render URL — fill in after the backend service exists.
      - key: BACKEND_URL
        sync: false
