name: Keep Render services awake

# Render's free tier spins a web service down after ~15 minutes with no
# incoming traffic, and the next real visitor then waits 20-50s for a cold
# start. Pinging both services every 10 minutes keeps them from ever hitting
# that idle threshold. GitHub's own scheduler can run a few minutes late,
# especially on quiet repos — this is a best-effort mitigation, not a
# guarantee, but it removes cold starts for all normal traffic patterns.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf -o /dev/null -w "backend: %{http_code}\n" https://zaraz-backend.onrender.com/api/catalog/cities || echo "backend ping failed"
      - name: Ping frontend
        run: curl -sf -o /dev/null -w "frontend: %{http_code}\n" https://zaraz-frontend.onrender.com/uk || echo "frontend ping failed"
